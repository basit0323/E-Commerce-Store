<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="x-icon" href="images/icons/shoping-bag-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="styles/search.css">
    <title>Shophouse</title>
</head>

<body>


    <!-- -------------------------------navbar HTML section--------------------------- -->

    <nav class="navbar js-navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/icons/shoping-bag-icon.png" alt="logo">
                <h3>shophouse</h3>
            </a>
        </div>
        <div class="delivery-province">
            <i class="fa-solid fa-location-dot"></i>
            <div class="delivery-province-name">
                <p>Deliver to</p>
                <h4>Pakistan</h4>
            </div>
        </div>
        <div class="search-product">
            <input type="search" class="product-search-input" placeholder="Search shophouse">
            <div class="search-icon">
                <img src="images/icons/search-icon-2.png" alt="search-icon">
            </div>
        </div>
        <div class="nav-links sign-in">
            <p>Register</p>
            <h4>Or Sign in</h4>
        </div>
        <div class="nav-links return-order">
            <p>Returns</p>
            <h4>& Orders</h4>
        </div>
        <div class="cart-count">
            <a href="checkout.html">
                <div class="count-icon">
                    <img src="images/icons/cart-icon.png" alt="">
                    <p class="cart-count-number js-cart-count-number">0</p>
                </div>
                <p class="cart-title">Cart</p>
            </a>
        </div>
    </nav>

    <!-- -------------------HTML for 2nd navbar---------------------- -->

    <nav class="filter-navbar">
        <div class="filter-links">
            <a href="#">
                <li>Today's Deals</li>
            </a>
            <a href="#">
                <li>Giftf Cards</li>
            </a>
            <a href="#">
                <li>Customer Service</li>
            </a>
            <a href="#">
                <li>Top Sells</li>
            </a>
        </div>
    </nav>

    <!-- ---------------------------HTML for search result section--------------------------- -->

    <div class="search-result">
        <div class="search-result-counter">

        </div>
        <div class="search-result-text">
            <h3>Search-results</h3>
        </div>
        <div class="search-result-items js-result-items">

        </div>
    </div>


    <script src="scripts/search.js" type="module"></script>
</body>

</html>
